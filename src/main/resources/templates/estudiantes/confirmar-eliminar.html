<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Eliminación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 5px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .student-info {
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #f44336;
            margin: 20px 0;
        }
        .student-info p {
            margin: 8px 0;
        }
        .warning {
            color: #f44336;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        button {
            padding: 10px 25px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #da190b;
        }
        a.btn-cancel {
            display: inline-block;
            padding: 10px 25px;
            background-color: #999;
            color: white;
            text-decoration: none;
            border-radius: 3px;
        }
        a.btn-cancel:hover {
            background-color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Confirmar Eliminación</h1>

        <div class="warning">
            ¿Está seguro de que desea eliminar este estudiante?
        </div>

        <div class="student-info">
            <p><strong>Nombre:</strong> <span th:text="${estudiante.nombre}"></span></p>
            <p><strong>Apellido:</strong> <span th:text="${estudiante.apellido}"></span></p>
            <p><strong>Correo:</strong> <span th:text="${estudiante.correo}"></span></p>
            <p><strong>Carrera:</strong> <span th:text="${estudiante.carrera}"></span></p>
        </div>

        <p style="color: #f44336; text-align: center;">Esta acción no se puede deshacer.</p>

        <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
            <div class="button-group">
                <button type="submit">Eliminar</button>
                <a th:href="@{/estudiantes}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
