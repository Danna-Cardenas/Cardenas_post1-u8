<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 5px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        .error {
            color: #f44336;
            font-size: 12px;
            margin-top: 3px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        button {
            padding: 10px 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #45a049;
        }
        a.btn-cancel {
            display: inline-block;
            padding: 10px 25px;
            background-color: #999;
            color: white;
            text-decoration: none;
            border-radius: 3px;
        }
        a.btn-cancel:hover {
            background-color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${titulo}"></h1>

        <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required />
                <div th:if="${#fields.hasErrors('nombre')}" class="error" th:errors="*{nombre}"></div>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" th:field="*{apellido}" required />
                <div th:if="${#fields.hasErrors('apellido')}" class="error" th:errors="*{apellido}"></div>
            </div>

            <div class="form-group">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" th:field="*{correo}" required />
                <div th:if="${#fields.hasErrors('correo')}" class="error" th:errors="*{correo}"></div>
            </div>

            <div class="form-group">
                <label for="carrera">Carrera:</label>
                <input type="text" id="carrera" th:field="*{carrera}" required />
                <div th:if="${#fields.hasErrors('carrera')}" class="error" th:errors="*{carrera}"></div>
            </div>

            <div class="button-group">
                <button type="submit">Guardar</button>
                <a th:href="@{/estudiantes}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
